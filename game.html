<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ミリオンクエスト THE GAME</title>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#050a18;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      user-select:none;
      -webkit-user-select:none;
      overflow:hidden;
    }
    canvas {
      display:block;
      border:3px solid #c9a84c;
      box-shadow:0 0 80px rgba(201,168,76,0.5);
      width:min(800px, 100vw);
      aspect-ratio:800/560;
      image-rendering:pixelated;
      image-rendering:crisp-edges;
    }
    #ctrl {
      display:none;
      margin-top:14px;
      gap:24px;
      align-items:center;
    }
    #dpad {
      display:grid;
      grid-template-areas:". u ." "l . r" ". d .";
      grid-template-columns:repeat(3,56px);
      grid-template-rows:repeat(3,56px);
      gap:4px;
    }
    #dpad button {
      background:rgba(201,168,76,0.12);
      border:2px solid rgba(201,168,76,0.45);
      border-radius:10px;
      color:#c9a84c;
      font-size:1.5rem;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      touch-action:none;
    }
    #dpad button:active { background:rgba(201,168,76,0.45); }
    .bu{grid-area:u} .bd{grid-area:d} .bl{grid-area:l} .br{grid-area:r}
    @media (max-width:820px){ #ctrl{ display:flex; } }
  </style>
</head>
<body>
<canvas id="c" width="800" height="560"></canvas>
<div id="ctrl">
  <div id="dpad">
    <button class="bu" id="bU">▲</button>
    <button class="bd" id="bD">▼</button>
    <button class="bl" id="bL">◀</button>
    <button class="br" id="bR">▶</button>
  </div>
</div>
<script>
// ════════════════════════════════════════════
//  MILLION QUEST  ─  Field Explorer
//  YouTube Demo Version
// ════════════════════════════════════════════
const CV  = document.getElementById('c');
const CTX = CV.getContext('2d');

// ── Constants ──────────────────────────────
const CW = 800, CH = 560;
const TS = 32;            // tile size px
const MW = 96, MH = 72;  // map tiles
const SPD = 2;            // px per frame
const PARTY_SPACING = 30; // px between members

// ── Tile IDs ───────────────────────────────
const T = {
  DEEP_SEA:0, SEA:1, SAND:2, GRASS:3, RICH:4, FLOWER:5,
  FOREST:6, MOUNTAIN:7, PEAK:8,
  PATH:9, STONE:10, WALL:11, ROOF:12, CASTLE:13,
  BRIDGE:14, WATER_LILY:15,
};
const SOLID = new Set([T.DEEP_SEA, T.SEA, T.MOUNTAIN, T.PEAK, T.WALL, T.CASTLE]);

// ── State ──────────────────────────────────
let STATE = 'TITLE';
let tick  = 0;
let map   = [];
let party = [];
let trail = []; // [{x,y}] history of leader pixel pos
let camX  = 0, camY = 0;
const keys = {};
const mb   = {u:false,d:false,l:false,r:false};

// ── Character definitions ───────────────────
const CHARS = [
  {name:'パパ',  role:'勇者',     body:'#2255bb', hair:'#3a2010', acc:'#c9a84c', skin:'#f5c890'},
  {name:'ママ',  role:'賢者',     body:'#cc6699', hair:'#7a4020', acc:'#ffffff', skin:'#f5c890'},
  {name:'姉',   role:'魔法使い', body:'#cc2222', hair:'#111111', acc:'#aa44ff', skin:'#f5c890'},
  {name:'妹',   role:'僧侶',     body:'#ddcc22', hair:'#5a3010', acc:'#44cc44', skin:'#f5c890'},
];

// ════════════════════════════════════════════
//  MAP GENERATION
// ════════════════════════════════════════════
function sn(x,y,f,s=0){
  const v = Math.sin(x*f*127.1+y*f*311.7+s*43)*43758.5;
  return v-Math.floor(v);
}

function buildMap(){
  map = Array.from({length:MH},()=>new Array(MW).fill(T.GRASS));

  // ── Base noise terrain ──
  for(let y=0;y<MH;y++){
    for(let x=0;x<MW;x++){
      const n = sn(x,y,0.07)*0.5 + sn(x,y,0.035,99)*0.35 + sn(x,y,0.15,55)*0.15;
      if(n<0.14)      map[y][x]=T.RICH;
      else if(n<0.42) map[y][x]=T.GRASS;
      else if(n<0.52) map[y][x]=T.FLOWER;
      else            map[y][x]=T.GRASS;
    }
  }

  // ── Ocean borders ──
  for(let y=0;y<MH;y++) for(let x=0;x<MW;x++){
    const d = Math.min(x,y,MW-1-x,MH-1-y);
    if(d<3)       map[y][x]=T.DEEP_SEA;
    else if(d<5)  map[y][x]=T.SEA;
    else if(d<7)  map[y][x]=T.SAND;
  }

  // ── Southern inlet sea ──
  for(let y=54;y<MH-7;y++) for(let x=22;x<58;x++){
    const wave = Math.sin(x*0.18)*4;
    if(y>60+wave) map[y][x]=T.SEA;
    else if(y>57+wave) map[y][x]=T.SAND;
  }

  // ── Northwest forest ──
  for(let y=8;y<32;y++) for(let x=8;x<30;x++){
    if(sn(x,y,0.28,7)>0.40 && map[y][x]!==T.SAND) map[y][x]=T.FOREST;
  }

  // ── East mountain range ──
  for(let y=7;y<30;y++) for(let x=65;x<90;x++){
    const d=Math.sqrt((x-77)**2*0.7+(y-16)**2);
    if(d<5)       map[y][x]=T.PEAK;
    else if(d<12) map[y][x]=T.MOUNTAIN;
    else if(d<15 && sn(x,y,0.3,30)>0.5) map[y][x]=T.MOUNTAIN;
  }

  // ── West hill range ──
  for(let y=30;y<50;y++) for(let x=7;x<22;x++){
    const d=Math.sqrt((x-13)**2*0.8+(y-40)**2);
    if(d<5)      map[y][x]=T.PEAK;
    else if(d<9) map[y][x]=T.MOUNTAIN;
  }

  // ── North rocky hills ──
  for(let y=7;y<18;y++) for(let x=60;x<75;x++){
    const d=Math.sqrt((x-67)**2+(y-12)**2*1.2);
    if(d<7) map[y][x]=T.MOUNTAIN;
  }

  // ── Roads ──
  const roads=[
    // main H (y=42)
    ...Array.from({length:MW-14},(_, i)=>([i+7,42])),
    // main V (x=48)
    ...Array.from({length:MH-14},(_, i)=>([48,i+7])),
    // east road (y=28, x=48..88)
    ...Array.from({length:40},(_, i)=>([48+i,28])),
    // south road (y=55, x=30..60)
    ...Array.from({length:30},(_, i)=>([30+i,55])),
    // west path (y=35, x=20..48)
    ...Array.from({length:28},(_, i)=>([20+i,35])),
    // north route (x=48, y=10..28)
    ...Array.from({length:18},(_, i)=>([48,10+i])),
  ];
  for(const[rx,ry] of roads){
    if(rx>=0&&rx<MW&&ry>=0&&ry<MH&&!SOLID.has(map[ry][rx]))
      map[ry][rx]=T.PATH;
  }

  // ── Villages ──
  village(48,40, 9,7);   // start / center
  village(22,33, 7,5);   // west
  village(70,40, 8,6);   // east
  village(47,62, 7,5);   // south port
  village(33,14, 8,6);   // north
  village(62,52, 6,5);   // southeast

  // ── Castle (north center) ──
  castle(47,7);

  // ── Bridges ──
  for(let bx=44;bx<=52;bx++){
    if(map[61][bx]===T.SEA||map[61][bx]===T.SAND) map[61][bx]=T.BRIDGE;
    if(map[62][bx]===T.SEA||map[62][bx]===T.SAND) map[62][bx]=T.BRIDGE;
  }

  // ── Scatter water lilies ──
  for(let i=0;i<60;i++){
    const lx=7+Math.floor(sn(i,0,0.1)*82);
    const ly=7+Math.floor(sn(0,i,0.1)*58);
    if(map[ly]&&map[ly][lx]===T.SEA) map[ly][lx]=T.WATER_LILY;
  }
}

function village(cx,cy,w,h){
  for(let y=cy;y<cy+h;y++) for(let x=cx;x<cx+w;x++){
    if(x>0&&x<MW-1&&y>0&&y<MH-1) map[y][x]=T.STONE;
  }
  const spots=[[cx+1,cy+1],[cx+w-2,cy+1],[cx+1,cy+h-3],[cx+w-2,cy+h-3]];
  for(const[bx,by] of spots){
    if(bx>0&&bx<MW-1&&by>0&&by<MH-1){
      map[by][bx]=T.WALL;
      if(by>0) map[by-1][bx]=T.ROOF;
    }
  }
}

function castle(cx,cy){
  for(let y=cy;y<cy+9;y++) for(let x=cx;x<cx+11;x++){
    if(x<0||x>=MW||y<0||y>=MH) continue;
    if(x===cx||x===cx+10||y===cy) map[y][x]=T.CASTLE;
    else map[y][x]=T.STONE;
  }
  map[cy+8][cx+4]=T.STONE;
  map[cy+8][cx+5]=T.STONE;
  map[cy+8][cx+6]=T.STONE;
}

// ════════════════════════════════════════════
//  TILE DRAWING
// ════════════════════════════════════════════
function tile(type,px,py){
  const x=px,y=py,s=TS,t=tick;
  switch(type){

    case T.DEEP_SEA:
      CTX.fillStyle='#063266'; CTX.fillRect(x,y,s,s);
      CTX.fillStyle=`rgba(80,160,255,${0.2+0.12*Math.sin(t*.04+px*.09)})`;
      CTX.fillRect(x+2,y+9+~~(Math.sin(t*.03+px*.2)*2),s-4,3);
      CTX.fillRect(x+5,y+21+~~(Math.sin(t*.03+px*.15+1)*2),s-10,2);
      break;

    case T.SEA:
      CTX.fillStyle='#1058a8'; CTX.fillRect(x,y,s,s);
      CTX.fillStyle=`rgba(120,200,255,${0.22+0.1*Math.sin(t*.04+py*.1)})`;
      CTX.fillRect(x+1,y+7+~~(Math.sin(t*.04+px*.18)*2),s-2,3);
      CTX.fillRect(x+4,y+19+~~(Math.sin(t*.04+px*.12+2)*2),s-8,2);
      break;

    case T.WATER_LILY:
      CTX.fillStyle='#1058a8'; CTX.fillRect(x,y,s,s);
      CTX.fillStyle='#1a7a1a'; CTX.beginPath();
      CTX.arc(x+16,y+17,8,0,Math.PI*2); CTX.fill();
      CTX.fillStyle='#ff88aa'; CTX.beginPath();
      CTX.arc(x+16,y+16,4,0,Math.PI*2); CTX.fill();
      CTX.fillStyle='#ffee44'; CTX.beginPath();
      CTX.arc(x+16,y+16,2,0,Math.PI*2); CTX.fill();
      break;

    case T.SAND:
      CTX.fillStyle='#caa86a'; CTX.fillRect(x,y,s,s);
      CTX.fillStyle='#b89050';
      CTX.fillRect(x+5,y+9,5,2); CTX.fillRect(x+18,y+21,6,2); CTX.fillRect(x+11,y+26,4,2);
      break;

    case T.GRASS:
      CTX.fillStyle='#469046'; CTX.fillRect(x,y,s,s);
      CTX.fillStyle='#3a7a3a';
      CTX.fillRect(x+3,y+14,2,5); CTX.fillRect(x+19,y+7,2,6); CTX.fillRect(x+26,y+22,2,5); CTX.fillRect(x+10,y+25,2,4);
      break;

    case T.RICH:
      CTX.fillStyle='#389038'; CTX.fillRect(x,y,s,s);
      CTX.fillStyle='#287028';
      [[4,8],[12,18],[21,5],[27,16],[7,26],[17,28]].forEach(([gx,gy])=>CTX.fillRect(x+gx,y+gy,2,6));
      break;

    case T.FLOWER:
      CTX.fillStyle='#469046'; CTX.fillRect(x,y,s,s);
      const fc=['#ff6b9d','#ffdd44','#ff9944','#bb66ff','#44ccff'];
      [[6,7],[19,19],[13,4],[24,13],[3,22],[27,26]].forEach(([fx,fy],i)=>{
        CTX.fillStyle=fc[i%5];
        CTX.beginPath(); CTX.arc(x+fx,y+fy,3.5,0,Math.PI*2); CTX.fill();
        CTX.fillStyle='#ffff88';
        CTX.beginPath(); CTX.arc(x+fx,y+fy,1.5,0,Math.PI*2); CTX.fill();
      });
      break;

    case T.FOREST:
      CTX.fillStyle='#1e5a1e'; CTX.fillRect(x,y,s,s);
      CTX.fillStyle='#5c2e0a'; CTX.fillRect(x+13,y+20,6,12);
      CTX.fillStyle='#145014';
      CTX.beginPath(); CTX.moveTo(x+16,y+1); CTX.lineTo(x+29,y+22); CTX.lineTo(x+3,y+22); CTX.closePath(); CTX.fill();
      CTX.fillStyle='#1a641a';
      CTX.beginPath(); CTX.moveTo(x+16,y+7); CTX.lineTo(x+28,y+26); CTX.lineTo(x+4,y+26); CTX.closePath(); CTX.fill();
      CTX.fillStyle='#22801e';
      CTX.beginPath(); CTX.moveTo(x+16,y+13); CTX.lineTo(x+27,y+30); CTX.lineTo(x+5,y+30); CTX.closePath(); CTX.fill();
      // highlight
      CTX.fillStyle='rgba(120,200,80,0.18)';
      CTX.beginPath(); CTX.arc(x+13,y+10,4,0,Math.PI*2); CTX.fill();
      break;

    case T.MOUNTAIN:
      CTX.fillStyle='#6a6070'; CTX.fillRect(x,y,s,s);
      CTX.fillStyle='#887880';
      CTX.beginPath(); CTX.moveTo(x+16,y+1); CTX.lineTo(x+31,y+31); CTX.lineTo(x+1,y+31); CTX.closePath(); CTX.fill();
      CTX.fillStyle='#a09098';
      CTX.beginPath(); CTX.moveTo(x+16,y+1); CTX.lineTo(x+25,y+17); CTX.lineTo(x+7,y+17); CTX.closePath(); CTX.fill();
      CTX.fillStyle='#e8eaf8';
      CTX.beginPath(); CTX.moveTo(x+16,y+1); CTX.lineTo(x+21,y+11); CTX.lineTo(x+11,y+11); CTX.closePath(); CTX.fill();
      break;

    case T.PEAK:
      CTX.fillStyle='#585060'; CTX.fillRect(x,y,s,s);
      CTX.fillStyle='#807080';
      CTX.beginPath(); CTX.moveTo(x+16,y+0); CTX.lineTo(x+32,y+32); CTX.lineTo(x+0,y+32); CTX.closePath(); CTX.fill();
      CTX.fillStyle='#f0f2ff';
      CTX.beginPath(); CTX.moveTo(x+16,y+0); CTX.lineTo(x+24,y+12); CTX.lineTo(x+8,y+12); CTX.closePath(); CTX.fill();
      CTX.fillStyle='rgba(255,255,255,0.5)';
      CTX.beginPath(); CTX.moveTo(x+16,y+0); CTX.lineTo(x+20,y+8); CTX.lineTo(x+12,y+8); CTX.closePath(); CTX.fill();
      break;

    case T.PATH:
      CTX.fillStyle='#a87c44'; CTX.fillRect(x,y,s,s);
      CTX.fillStyle='#c09050'; CTX.fillRect(x+3,y+3,26,26);
      CTX.fillStyle='#987038';
      CTX.fillRect(x+6,y+12,8,3); CTX.fillRect(x+18,y+20,7,3);
      break;

    case T.STONE:
      CTX.fillStyle='#888898'; CTX.fillRect(x,y,s,s);
      CTX.fillStyle='#787888';
      CTX.fillRect(x+1,y+1,15,15); CTX.fillRect(x+17,y+17,14,14);
      CTX.fillStyle='#686878';
      CTX.fillRect(x+2,y+2,13,13); CTX.fillRect(x+18,y+18,12,12);
      CTX.strokeStyle='#606070'; CTX.lineWidth=0.5;
      CTX.strokeRect(x+0.5,y+0.5,s-1,s-1);
      CTX.strokeRect(x+16.5,y+0.5,s/2-1,s/2-1);
      CTX.strokeRect(x+0.5,y+16.5,s/2-1,s/2-1);
      break;

    case T.WALL:
      CTX.fillStyle='#eedcb8'; CTX.fillRect(x,y,s,s);
      // windows
      CTX.fillStyle='#5888cc'; CTX.fillRect(x+6,y+8,8,8); CTX.fillRect(x+18,y+8,8,8);
      CTX.fillStyle='#2a5898';
      CTX.fillRect(x+9,y+8,2,8); CTX.fillRect(x+21,y+8,2,8);
      CTX.fillRect(x+6,y+11,8,2); CTX.fillRect(x+18,y+11,8,2);
      // wall border
      CTX.strokeStyle='#c0a888'; CTX.lineWidth=1;
      CTX.strokeRect(x+0.5,y+0.5,s-1,s-1);
      break;

    case T.ROOF:
      CTX.fillStyle='#aa2010'; CTX.fillRect(x,y,s,s);
      CTX.fillStyle='#881808';
      for(let rr=0;rr<4;rr++) for(let rc=0;rc<4;rc++)
        CTX.fillRect(x+rc*8,y+rr*8,7,5);
      CTX.fillStyle='#cc3020';
      for(let rc=0;rc<4;rc++) CTX.fillRect(x+rc*8,y,7,3);
      break;

    case T.CASTLE:
      CTX.fillStyle='#484058'; CTX.fillRect(x,y,s,s);
      CTX.fillStyle='#383048';
      CTX.fillRect(x,y,9,12); CTX.fillRect(x+12,y,8,12); CTX.fillRect(x+24,y,8,12);
      CTX.fillStyle='#585868';
      CTX.fillRect(x+2,y+14,12,6); CTX.fillRect(x+18,y+20,12,6);
      CTX.fillStyle='#302840';
      CTX.fillRect(x,y,s,2); // top edge
      break;

    case T.BRIDGE:
      CTX.fillStyle='#1058a8'; CTX.fillRect(x,y,s,s);
      CTX.fillStyle='#7a4a1e'; CTX.fillRect(x,y+7,s,7); CTX.fillRect(x,y+18,s,7);
      CTX.fillStyle='#5a3010';
      for(let i=0;i<4;i++){ CTX.fillRect(x+i*8+2,y+7,3,7); CTX.fillRect(x+i*8+2,y+18,3,7); }
      CTX.fillStyle='#3a2008'; CTX.fillRect(x,y+5,s,2); CTX.fillRect(x,y+25,s,2);
      break;

    default:
      CTX.fillStyle='#469046'; CTX.fillRect(x,y,s,s);
  }
}

// ════════════════════════════════════════════
//  CHARACTER DRAWING
// ════════════════════════════════════════════
function drawChar(idx,px,py,dir,frame){
  const ch=CHARS[idx];
  const f=frame%2;
  const x=Math.round(px)-11;
  const y=Math.round(py)-26;

  // shadow
  CTX.fillStyle='rgba(0,0,0,0.22)';
  CTX.beginPath(); CTX.ellipse(x+11,y+30,9,3.5,0,0,Math.PI*2); CTX.fill();

  // legs
  CTX.fillStyle='#1a1430';
  if(f===0){
    CTX.fillRect(x+5,y+19,5,8);
    CTX.fillRect(x+12,y+19,5,8);
  } else {
    CTX.fillRect(x+4,y+19,5,9);
    CTX.fillRect(x+13,y+19,5,7);
  }
  // shoes
  CTX.fillStyle='#100808';
  if(f===0){
    CTX.fillRect(x+4,y+26,6,3); CTX.fillRect(x+11,y+26,6,3);
  } else {
    CTX.fillRect(x+3,y+27,6,3); CTX.fillRect(x+13,y+25,6,3);
  }

  // body
  CTX.fillStyle=ch.body;
  CTX.fillRect(x+3,y+8,16,12);

  // belt/accent
  CTX.fillStyle=ch.acc;
  CTX.fillRect(x+3,y+17,16,2);

  // arms (swing with walk)
  CTX.fillStyle=ch.body;
  const as=f===0?0:2;
  if(dir==='up'){
    CTX.fillRect(x+0,y+9,3,8);
    CTX.fillRect(x+19,y+9,3,8);
  } else {
    CTX.fillRect(x+0,y+9+as,3,8);
    CTX.fillRect(x+19,y+9-as,3,8);
  }

  // head
  CTX.fillStyle=ch.skin;
  CTX.fillRect(x+4,y+1,14,10);

  // hair
  CTX.fillStyle=ch.hair;
  CTX.fillRect(x+3,y+0,16,4);
  if(dir!=='up'){
    CTX.fillRect(x+2,y+0,3,7);
    CTX.fillRect(x+17,y+0,3,6);
  } else {
    CTX.fillRect(x+2,y+0,3,10);
    CTX.fillRect(x+17,y+0,3,10);
  }

  // character hair extras
  if(idx===1){ // mama: long hair sides
    CTX.fillStyle=ch.hair;
    CTX.fillRect(x+1,y+0,3,13);
    CTX.fillRect(x+18,y+0,3,12);
  }
  if(idx===3){ // little sister: twintails
    CTX.fillStyle='#ff88aa';
    CTX.fillRect(x+1,y+2,3,5);
    CTX.fillRect(x+18,y+2,3,5);
  }

  // eyes
  if(dir!=='up'){
    CTX.fillStyle='#1a1a2a';
    CTX.fillRect(x+6,y+5,2,2);
    CTX.fillRect(x+14,y+5,2,2);
    // eye highlight
    CTX.fillStyle='rgba(255,255,255,0.7)';
    CTX.fillRect(x+7,y+5,1,1);
    CTX.fillRect(x+15,y+5,1,1);
  }

  // accessories
  if(idx===0){ // papa: sword
    const sx=dir==='left'?x-4:x+21;
    CTX.fillStyle='#c8c8e0'; CTX.fillRect(sx,y+10,3,12);
    CTX.fillStyle='#c9a84c'; CTX.fillRect(sx-1,y+14,5,3);
    CTX.fillStyle='#8a6030'; CTX.fillRect(sx,y+10,3,3);
  }
  if(idx===1){ // mama: staff
    const sx=dir==='left'?x-4:x+22;
    CTX.fillStyle='#8a6030'; CTX.fillRect(sx,y+6,3,22);
    CTX.fillStyle='#44aaff';
    CTX.beginPath(); CTX.arc(sx+1,y+4,4,0,Math.PI*2); CTX.fill();
    if(tick%30<15){
      CTX.fillStyle='rgba(100,200,255,0.4)';
      CTX.beginPath(); CTX.arc(sx+1,y+4,7,0,Math.PI*2); CTX.fill();
    }
  }
  if(idx===2){ // sister: wand
    const sx=dir==='left'?x-4:x+22;
    CTX.fillStyle='#6030a0'; CTX.fillRect(sx,y+6,2,20);
    if(tick%20<10){
      CTX.fillStyle='#cc44ff';
      CTX.beginPath(); CTX.arc(sx+1,y+5,4,0,Math.PI*2); CTX.fill();
      CTX.fillStyle='rgba(200,100,255,0.35)';
      CTX.beginPath(); CTX.arc(sx+1,y+5,7,0,Math.PI*2); CTX.fill();
    }
  }
  if(idx===3){ // little sister: holy pendant
    CTX.fillStyle='#ffee44';
    CTX.beginPath(); CTX.arc(x+11,y+15,2,0,Math.PI*2); CTX.fill();
  }
}

// ════════════════════════════════════════════
//  PARTY INIT
// ════════════════════════════════════════════
function initParty(){
  const sx=(48+4)*TS+TS/2;
  const sy=(40+3)*TS+TS/2;
  party=CHARS.map(()=>({px:sx,py:sy,dir:'down',animFrame:0,animTimer:0}));
  const trailLen=PARTY_SPACING*(CHARS.length-1)+40;
  trail=Array.from({length:trailLen},()=>({x:sx,y:sy}));
  camX=sx-CW/2;
  camY=sy-CH/2;
}

// ════════════════════════════════════════════
//  INPUT
// ════════════════════════════════════════════
window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(STATE==='TITLE') startGame();
});
window.addEventListener('keyup',e=>{ keys[e.key]=false; });

function setupMobile(){
  const pairs=[['bU','u'],['bD','d'],['bL','l'],['bR','r']];
  for(const[id,dir] of pairs){
    const btn=document.getElementById(id);
    if(!btn) continue;
    const on =e=>{e.preventDefault();mb[dir]=true;};
    const off=e=>{e.preventDefault();mb[dir]=false;};
    btn.addEventListener('touchstart',on,{passive:false});
    btn.addEventListener('touchend',off,{passive:false});
    btn.addEventListener('mousedown',()=>mb[dir]=true);
    btn.addEventListener('mouseup',()=>mb[dir]=false);
    btn.addEventListener('mouseleave',()=>mb[dir]=false);
  }
  // tap anywhere on title to start
  CV.addEventListener('touchstart',()=>{ if(STATE==='TITLE') startGame(); });
}

const up=   ()=>keys['ArrowUp']   ||keys['w']||keys['W']||mb.u;
const down= ()=>keys['ArrowDown'] ||keys['s']||keys['S']||mb.d;
const left= ()=>keys['ArrowLeft'] ||keys['a']||keys['A']||mb.l;
const right=()=>keys['ArrowRight']||keys['d']||keys['D']||mb.r;

// ════════════════════════════════════════════
//  COLLISION
// ════════════════════════════════════════════
function passable(wx,wy){
  const tx=Math.floor(wx/TS), ty=Math.floor(wy/TS);
  if(tx<0||tx>=MW||ty<0||ty>=MH) return false;
  return !SOLID.has(map[ty][tx]);
}
function canMove(px,py,dx,dy){
  const nx=px+dx, ny=py+dy, r=10;
  return passable(nx-r,ny-r)&&passable(nx+r,ny-r)&&
         passable(nx-r,ny+r)&&passable(nx+r,ny+r);
}

// ════════════════════════════════════════════
//  GAME LOGIC
// ════════════════════════════════════════════
function startGame(){
  buildMap();
  initParty();
  STATE='FIELD';
}

function updateField(){
  const L=party[0];
  let dx=0,dy=0;
  if(up())    {dy=-SPD; L.dir='up';}
  if(down())  {dy= SPD; L.dir='down';}
  if(left())  {dx=-SPD; L.dir='left';}
  if(right()) {dx= SPD; L.dir='right';}
  if(dx&&dy){ dx*=0.707; dy*=0.707; }

  let moved=false;
  if(dx||dy){
    if(canMove(L.px,L.py,dx,dy)){
      L.px+=dx; L.py+=dy; moved=true;
    } else if(canMove(L.px,L.py,dx,0)){
      L.px+=dx; moved=true;
    } else if(canMove(L.px,L.py,0,dy)){
      L.py+=dy; moved=true;
    }
  }

  if(moved){
    trail.unshift({x:L.px,y:L.py});
    const maxLen=PARTY_SPACING*(CHARS.length-1)+50;
    if(trail.length>maxLen) trail.length=maxLen;
  }

  // anim leader
  if(dx||dy){
    L.animTimer++;
    if(L.animTimer>7){ L.animTimer=0; L.animFrame++; }
  }

  // followers
  for(let i=1;i<party.length;i++){
    const hi=Math.min(PARTY_SPACING*i, trail.length-1);
    const hp=Math.max(hi-1,0);
    const target=trail[hi];
    const prev  =trail[hp];

    const ox=party[i].px, oy=party[i].py;
    party[i].px=target.x;
    party[i].py=target.y;

    const fdx=target.x-prev.x, fdy=target.y-prev.y;
    if(Math.abs(fdx)>Math.abs(fdy)){
      party[i].dir=fdx<0?'left':'right';
    } else if(Math.abs(fdy)>0.01){
      party[i].dir=fdy<0?'up':'down';
    }

    const moving=Math.abs(target.x-ox)+Math.abs(target.y-oy)>0.1;
    if(moving){
      party[i].animTimer=(party[i].animTimer||0)+1;
      if(party[i].animTimer>7){ party[i].animTimer=0; party[i].animFrame++; }
    }
  }

  // smooth camera
  const tcx=L.px-CW/2, tcy=L.py-CH/2;
  camX+=(tcx-camX)*0.1;
  camY+=(tcy-camY)*0.1;
  camX=Math.max(0,Math.min(MW*TS-CW,camX));
  camY=Math.max(0,Math.min(MH*TS-CH,camY));
}

// ════════════════════════════════════════════
//  RENDERING
// ════════════════════════════════════════════
function renderTitle(){
  // sky gradient
  const grd=CTX.createLinearGradient(0,0,0,CH);
  grd.addColorStop(0,'#020818'); grd.addColorStop(1,'#0a1840');
  CTX.fillStyle=grd; CTX.fillRect(0,0,CW,CH);

  // stars
  for(let i=0;i<120;i++){
    const sx=(i*137+23)%CW, sy=(i*211+71)%CH;
    const br=0.4+0.6*Math.sin(tick*.05+i*.8);
    CTX.globalAlpha=br;
    CTX.fillStyle='#ffffff';
    CTX.fillRect(sx,sy,i%5===0?2:1,i%5===0?2:1);
  }
  CTX.globalAlpha=1;

  // title box
  CTX.fillStyle='rgba(4,10,36,0.88)';
  roundRect(CTX,CW/2-210,CH/2-130,420,220,14,true,false);
  CTX.strokeStyle='#c9a84c'; CTX.lineWidth=2;
  roundRect(CTX,CW/2-210,CH/2-130,420,220,14,false,true);
  CTX.strokeStyle='rgba(201,168,76,0.4)'; CTX.lineWidth=1;
  roundRect(CTX,CW/2-205,CH/2-125,410,210,12,false,true);

  // logo area
  CTX.font='12px DotGothic16,monospace'; CTX.fillStyle='#c9a84c';
  CTX.textAlign='center';
  CTX.fillText('✦  MILLION QUEST  ✦', CW/2, CH/2-96);

  CTX.font='38px DotGothic16,monospace';
  const tg=CTX.createLinearGradient(CW/2-160,0,CW/2+160,0);
  tg.addColorStop(0,'#c9a84c'); tg.addColorStop(0.5,'#ffffff'); tg.addColorStop(1,'#c9a84c');
  CTX.fillStyle=tg;
  CTX.fillText('ミリオンクエスト', CW/2, CH/2-50);

  CTX.font='15px DotGothic16,monospace'; CTX.fillStyle='#88bbff';
  CTX.fillText('普通家族の  お金の冒険', CW/2, CH/2-16);

  CTX.font='12px DotGothic16,monospace'; CTX.fillStyle='rgba(255,255,255,0.55)';
  CTX.fillText('目標 $1,000,000  ─  YouTube収益ゼロで達成する', CW/2, CH/2+16);

  if(tick%70<50){
    CTX.font='13px DotGothic16,monospace'; CTX.fillStyle='#c9a84c';
    CTX.fillText('▶  どれかキーを押してはじめる  ◀', CW/2, CH/2+60);
  }

  // party preview
  CTX.font='11px DotGothic16,monospace'; CTX.fillStyle='rgba(255,255,255,0.5)';
  CTX.fillText('パパ（勇者）  ・  ママ（賢者）  ・  姉（魔法使い）  ・  妹（僧侶）', CW/2, CH/2+92);
}

function renderField(){
  // bg (for gaps)
  CTX.fillStyle='#2a4a20'; CTX.fillRect(0,0,CW,CH);

  const tx0=Math.max(0,~~(camX/TS)-1);
  const ty0=Math.max(0,~~(camY/TS)-1);
  const tx1=Math.min(MW,tx0+~~(CW/TS)+4);
  const ty1=Math.min(MH,ty0+~~(CH/TS)+4);

  for(let ty=ty0;ty<ty1;ty++){
    for(let tx=tx0;tx<tx1;tx++){
      tile(map[ty][tx], ~~(tx*TS-camX), ~~(ty*TS-camY));
    }
  }

  // draw party sorted by Y (painter's algorithm)
  [...party].map((p,i)=>({...p,i}))
    .sort((a,b)=>a.py-b.py)
    .forEach(p=>{
      const sx=p.px-camX, sy=p.py-camY;
      if(sx>-50&&sx<CW+50&&sy>-50&&sy<CH+50)
        drawChar(p.i, sx, sy, p.dir, p.animFrame);
    });

  hud();
}

function hud(){
  // top bar
  CTX.fillStyle='rgba(4,8,24,0.78)'; CTX.fillRect(0,0,CW,38);
  CTX.strokeStyle='#c9a84c'; CTX.lineWidth=1;
  CTX.beginPath(); CTX.moveTo(0,38); CTX.lineTo(CW,38); CTX.stroke();

  CTX.font='bold 14px DotGothic16,monospace';
  CTX.fillStyle='#c9a84c'; CTX.textAlign='left';
  CTX.fillText('ミリオンクエスト', 14, 25);

  CTX.font='12px DotGothic16,monospace';
  CTX.fillStyle='rgba(255,255,255,0.65)'; CTX.textAlign='right';
  CTX.fillText('目標  $1,000,000  ─  普通家族の冒険', CW-14, 25);

  // bottom party bar
  CTX.fillStyle='rgba(4,8,24,0.80)'; CTX.fillRect(0,CH-48,CW,48);
  CTX.strokeStyle='#c9a84c'; CTX.lineWidth=1;
  CTX.beginPath(); CTX.moveTo(0,CH-48); CTX.lineTo(CW,CH-48); CTX.stroke();

  CHARS.forEach((ch,i)=>{
    const bx=14+i*196;
    // mini char icon
    CTX.fillStyle=ch.body; CTX.fillRect(bx,CH-40,8,16);
    CTX.fillStyle=ch.skin; CTX.fillRect(bx,CH-42,8,8);
    CTX.fillStyle=ch.hair; CTX.fillRect(bx,CH-44,8,6);

    CTX.font='bold 11px DotGothic16,monospace';
    CTX.fillStyle='#c9a84c'; CTX.textAlign='left';
    CTX.fillText(`${ch.name}`, bx+12, CH-32);
    CTX.font='10px DotGothic16,monospace';
    CTX.fillStyle='rgba(200,200,220,0.7)';
    CTX.fillText(`[${ch.role}]`, bx+12, CH-18);
  });
}

function roundRect(ctx,x,y,w,h,r,fill,stroke){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
  if(fill) ctx.fill();
  if(stroke) ctx.stroke();
}

// ════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════
function loop(){
  tick++;
  if(STATE==='TITLE')  renderTitle();
  else if(STATE==='FIELD'){ updateField(); renderField(); }
  requestAnimationFrame(loop);
}

setupMobile();
loop();
</script>
